<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сообщения — FitPartner</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body style="overflow:hidden;">
  <nav class="navbar">
    <div class="nav-logo">💪 FitPartner</div>
    <div class="nav-links">
      <a href="dashboard.html"    class="nav-link">🏠</a>
      <a href="partners.html"     class="nav-link">🔍</a>
      <a href="messages.html"     class="nav-link active">💬</a>
      <a href="subscription.html" class="nav-link">⭐</a>
      <a href="profile.html"      class="nav-link">👤</a>
      <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Выйти</button>
    </div>
  </nav>

  <div style="padding-top:68px;height:100vh;">
    <div class="messages-layout">
      <div class="chats-sidebar">
        <div class="chats-header">💬 Чаты</div>
        <div id="chatsList"><div class="loading-screen"><div class="loader"></div></div></div>
      </div>
      <div class="chat-main" id="chatMain">
        <div class="no-chat-selected">
          <div style="font-size:64px;">💬</div>
          <div>Выберите чат или найдите партнёра</div>
          <a href="partners.html" class="btn btn-primary btn-sm" style="margin-top:12px;">Найти партнёра</a>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    if (!requireAuth()) throw 0;
    const me = getUser();
    let activeUserId = null;

    const sp = new URLSearchParams(location.search);
    const initId   = sp.get('userId');
    const initName = sp.get('userName');

    loadChats();
    if (initId) openChat(initId, decodeURIComponent(initName || 'Пользователь'));

    async function loadChats() {
      try {
        const { chats } = await Messages.getChats();
        const box = document.getElementById('chatsList');
        if (!chats.length) { box.innerHTML = '<div style="padding:24px;color:var(--muted);text-align:center;font-size:14px;">Нет чатов. Найдите партнёра!</div>'; return; }
        box.innerHTML = chats.map(c => `
          <div class="chat-item" id="chat-${c.other_id}" onclick="openChat('${c.other_id}','${c.other_name}')">
            <div class="chat-avatar">${getAvatar(c.other_name)}</div>
            <div style="min-width:0;flex:1;">
              <div class="chat-name">${c.other_name}</div>
              <div class="chat-preview">${c.last_text}</div>
            </div>
            ${c.unread_count>0?'<div class="chat-unread">'+c.unread_count+'</div>':''}
          </div>`).join('');
      } catch(e) {}
    }

    async function openChat(userId, userName) {
      activeUserId = userId;
      document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
      const el = document.getElementById('chat-'+userId);
      if (el) el.classList.add('active');

      document.getElementById('chatMain').innerHTML = `
        <div class="chat-header">
          <div class="chat-avatar" style="width:40px;height:40px;font-size:18px;">${getAvatar(userName)}</div>
          <div><div style="font-weight:700;">${userName}</div><div style="font-size:12px;color:var(--muted);">📍 Алматы</div></div>
          <a href="partners.html" class="btn btn-ghost btn-sm" style="margin-left:auto;">Найти ещё</a>
        </div>
        <div class="chat-messages" id="msgBox"><div class="loading-screen"><div class="loader"></div></div></div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="msgInput" placeholder="Написать сообщение..." onkeydown="if(event.key==='Enter')sendMsg()">
          <button class="btn btn-primary" onclick="sendMsg()" style="height:50px;padding:0 20px;">➤</button>
        </div>`;

      try {
        const { messages } = await Messages.getDialog(userId);
        renderMsgs(messages);
      } catch(e) {}
    }

    function renderMsgs(messages) {
      const box = document.getElementById('msgBox');
      if (!box) return;
      if (!messages.length) { box.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;">Начните диалог! 👋</div>'; return; }
      box.innerHTML = messages.map(m => {
        const mine = String(m.from_user) === String(me?.id);
        return '<div class="msg-bubble '+(mine?'mine':'theirs')+'"><div>'+m.text+'</div><div class="msg-time">'+fmtTime(m.created_at)+'</div></div>';
      }).join('');
      box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
      const input = document.getElementById('msgInput');
      if (!input) return;
      const text = input.value.trim();
      if (!text || !activeUserId) return;
      input.value = '';
      try {
        const { message } = await Messages.send(activeUserId, text);
        const box = document.getElementById('msgBox');
        if (box) {
          const el = document.createElement('div');
          el.className = 'msg-bubble mine';
          el.innerHTML = '<div>'+message.text+'</div><div class="msg-time">'+fmtTime(message.created_at)+'</div>';
          box.appendChild(el);
          box.scrollTop = box.scrollHeight;
        }
        loadChats();
      } catch(e) { showAlert(e.message); }
    }
  </script>
</body>
</html>
