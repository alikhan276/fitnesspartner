<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — FitPartner</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">💪 FitPartner</div>
    <div class="nav-links">
      <a href="dashboard.html"    class="nav-link">🏠 <span>Главная</span></a>
      <a href="partners.html"     class="nav-link">🔍 <span>Партнёры</span></a>
      <a href="messages.html"     class="nav-link">💬 <span>Сообщения</span></a>
      <a href="subscription.html" class="nav-link">⭐ <span>Подписка</span></a>
      <a href="profile.html"      class="nav-link active">👤 <span>Профиль</span></a>
      <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Выйти</button>
    </div>
  </nav>

  <div class="page-wrapper container" style="padding-top:88px;padding-bottom:60px;max-width:800px;">
    <div class="alert-box"></div>
    <div id="profileView"><div class="loading-screen"><div class="loader"></div></div></div>

    <!-- ФОРМА РЕДАКТИРОВАНИЯ -->
    <div id="editForm" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <h2 style="font-size:24px;font-weight:700;">✏️ Редактировать профиль</h2>
        <button class="btn btn-ghost btn-sm" onclick="cancelEdit()">Отмена</button>
      </div>
      <div class="card">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Имя</label><input type="text" id="eName" class="form-input"></div>
          <div class="form-group"><label class="form-label">Возраст</label><input type="number" id="eAge" class="form-input"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Телефон</label><input type="tel" id="ePhone" class="form-input" placeholder="+7..."></div>
          <div class="form-group"><label class="form-label">Район</label>
            <select id="eDistrict" class="form-select">
              <option>Алатауский</option><option>Алмалинский</option><option>Ауэзовский</option>
              <option>Бостандыкский</option><option>Жетысуский</option><option>Медеуский</option>
              <option>Наурызбайский</option><option>Турксибский</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Уровень</label>
          <select id="eLevel" class="form-select">
            <option value="beginner">Новичок</option>
            <option value="intermediate">Средний</option>
            <option value="advanced">Продвинутый</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Спортзал</label><input type="text" id="eGym" class="form-input" placeholder="Название зала"></div>
        <div class="form-group">
          <label class="form-label">Цели</label>
          <div class="tags-selector" id="eGoals">
            <div class="tag-btn" onclick="toggleTag(this,'goals')">⚖️ Похудение</div>
            <div class="tag-btn" onclick="toggleTag(this,'goals')">💪 Набор мышц</div>
            <div class="tag-btn" onclick="toggleTag(this,'goals')">🏃 Выносливость</div>
            <div class="tag-btn" onclick="toggleTag(this,'goals')">🤸 Гибкость</div>
            <div class="tag-btn" onclick="toggleTag(this,'goals')">✨ Общий тонус</div>
            <div class="tag-btn" onclick="toggleTag(this,'goals')">❤️ Кардио</div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">График</label>
          <div class="tags-selector" id="eSchedule">
            <div class="tag-btn" onclick="toggleTag(this,'schedule')">🌅 Утро</div>
            <div class="tag-btn" onclick="toggleTag(this,'schedule')">🌆 Вечер</div>
            <div class="tag-btn" onclick="toggleTag(this,'schedule')">📅 Выходные</div>
            <div class="tag-btn" onclick="toggleTag(this,'schedule')">🕐 Обед</div>
          </div>
        </div>
        <div class="form-group"><label class="form-label">О себе</label><textarea id="eBio" class="form-textarea"></textarea></div>
        <button class="btn btn-primary btn-full" id="saveBtn" onclick="saveProfile()">💾 Сохранить</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    if (!requireAuth()) throw 0;
    let me = null;
    const etags = { goals: [], schedule: [] };

    (async () => {
      try {
        const { user } = await Auth.me();
        me = user;
        renderProfile(user);
      } catch(e) { showAlert(e.message); }
    })();

    function renderProfile(u) {
      document.getElementById('profileView').innerHTML = `
        <div class="profile-header">
          <div class="profile-avatar-big">${getAvatar(u.name)}</div>
          <div style="flex:1;">
            <div class="profile-name">${u.name} ${u.is_subscribed?'⭐':''}</div>
            <div class="profile-meta">📍 ${u.district||'Алматы'} · ${levelLabel[u.fitness_level]||'Новичок'}${u.age?' · 🎂 '+u.age+' лет':''}${u.gym?' · 🏟 '+u.gym:''}</div>
            ${u.bio?'<div style="color:var(--muted);font-size:15px;margin-top:8px;">'+u.bio+'</div>':''}
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;">
              ${(u.goals||[]).map(g=>'<span class="badge badge-blue">'+g+'</span>').join('')}
              ${(u.schedule||[]).map(s=>'<span class="badge badge-purple">'+s+'</span>').join('')}
            </div>
          </div>
          <button class="btn btn-outline btn-sm" style="flex-shrink:0;" onclick="startEdit()">✏️ Изменить</button>
        </div>
        <div class="card">
          <div class="card-title" style="margin-bottom:20px;">📊 Информация</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div><div class="filter-label">Email</div><div>${u.email}</div></div>
            <div><div class="filter-label">Телефон</div><div>${u.phone||'Не указан'}</div></div>
            <div><div class="filter-label">Район</div><div>${u.district||'Не указан'}</div></div>
            <div><div class="filter-label">Уровень</div><div>${levelLabel[u.fitness_level]||'—'}</div></div>
            <div><div class="filter-label">Подписка</div><div>${u.is_subscribed?'⭐ Активна до '+new Date(u.subscription_expiry).toLocaleDateString('ru-RU'):'🔓 Не активна'}</div></div>
            <div><div class="filter-label">Регистрация</div><div>${new Date(u.created_at).toLocaleDateString('ru-RU')}</div></div>
          </div>
          ${!u.is_subscribed?'<div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border);"><a href="subscription.html" class="btn btn-primary btn-sm">⭐ Оформить подписку — 1 000 ₸</a></div>':''}
        </div>`;
    }

    function startEdit() {
      const u = me;
      document.getElementById('profileView').style.display = 'none';
      document.getElementById('editForm').style.display = 'block';
      document.getElementById('eName').value     = u.name || '';
      document.getElementById('eAge').value      = u.age || '';
      document.getElementById('ePhone').value    = u.phone || '';
      document.getElementById('eDistrict').value = u.district || 'Алмалинский';
      document.getElementById('eLevel').value    = u.fitness_level || 'beginner';
      document.getElementById('eGym').value      = u.gym || '';
      document.getElementById('eBio').value      = u.bio || '';
      etags.goals    = [...(u.goals||[])];
      etags.schedule = [...(u.schedule||[])];
      document.querySelectorAll('#eGoals .tag-btn, #eSchedule .tag-btn').forEach(btn => {
        const type = btn.closest('#eGoals') ? 'goals' : 'schedule';
        if (etags[type].includes(btn.textContent.trim())) btn.classList.add('selected');
      });
    }

    function cancelEdit() {
      document.getElementById('profileView').style.display = 'block';
      document.getElementById('editForm').style.display = 'none';
    }

    function toggleTag(el, type) {
      el.classList.toggle('selected');
      const val = el.textContent.trim();
      if (el.classList.contains('selected')) etags[type].push(val);
      else etags[type] = etags[type].filter(t => t !== val);
    }

    async function saveProfile() {
      const btn = document.getElementById('saveBtn');
      setBtn(btn, true);
      try {
        const { user } = await Auth.updateProfile({
          name:         document.getElementById('eName').value.trim(),
          age:          parseInt(document.getElementById('eAge').value) || undefined,
          phone:        document.getElementById('ePhone').value.trim() || undefined,
          district:     document.getElementById('eDistrict').value,
          fitnessLevel: document.getElementById('eLevel').value,
          gym:          document.getElementById('eGym').value.trim() || undefined,
          bio:          document.getElementById('eBio').value.trim() || undefined,
          goals:        etags.goals,
          schedule:     etags.schedule
        });
        me = user;
        renderProfile(user);
        cancelEdit();
        showAlert('Профиль обновлён!', 'success');
      } catch(e) {
        showAlert(e.message);
      } finally {
        setBtn(btn, false, '💾 Сохранить');
      }
    }
  </script>
</body>
</html>
